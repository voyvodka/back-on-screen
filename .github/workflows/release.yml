name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Install
            - Configure page: https://bos.sametozkan.com.tr/configure
            - Manifest URL: https://bos.sametozkan.com.tr/manifest.json

            ## Notes
            - The auto-generated Source code archives are for self-hosting or development.
            - A standalone `manifest.json` asset is not attached because this addon serves dynamic catalog and meta endpoints from the running app.
            - For direct Stremio installation, use the hosted manifest URL above.
          generate_release_notes: true
